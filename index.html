<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاسبه اقساط</title>

    <style>
        body {
            font-family: Tahoma, sans-serif;
            font-weight: 600;
            max-width: 800px;
            margin: 10px auto;
            padding: 4px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input {
            background-color: #E7DFEC;
            border-color: #E7DFEC;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        .sub-row{
            margin-top: 6px;
            border: 1px solid #E7DFEC;
            background-color: #E7DFEC;
            border-radius: 8px;
            padding: 2px;
            margin:12px auto;
            display: flex;
            justify-content: flex-start;
        }

        .label-box{
            width: 120px;
            text-align: center;
            background-color: #674FA3;
            color:white;
            border-radius: 6px;
            padding: 6px;
        }

        .value-box{
            flex: 1;
            background-color: #E7DFEC;
            border-radius: 6px;
            padding: 6px 12px;
            font-weight:800;
            font-size: large;
            display: flex;
            align-items: center;
            justify-content: flex-start;

            direction: ltr;
        }

    </style>
</head>
<body>

    <div class="input-group">
        <label for="price">مبلغ</label>
        <input type="text" id="price" inputmode="numeric" oninput="formatPriceAndCalculate(this)">
    </div>

    <div class="input-group">
        <label for="installments">تعداد اقساط</label>
        <input type="number" id="installments" oninput="calculate()">
    </div>

    <br/>

    <div class="sub-row">
        <div class="label-box">قسط ماهانه با کارمزد</div>
        <div class="value-box" id="monthlyInstallmentWithWage">0</div>
    </div>

    <div class="sub-row">
        <div class="label-box">سود</div>
        <div class="value-box" id="profit">0</div>
    </div>

    <div class="sub-row">
        <div class="label-box">اصل و سود</div>
        <div class="value-box" id="totalAmount">0</div>
    </div>

    <div class="sub-row">
        <div class="label-box">قسط ماهانه</div>
        <div class="value-box" id="monthlyInstallment">0</div>
    </div>

    <div class="sub-row">
        <div class="label-box">کارمزد</div>
        <div class="value-box" id="wage">0</div>
    </div>

    <div class="sub-row">
        <div class="label-box">راسی</div>
        <div class="value-box" id="due">0</div>
    </div>

    
    <script>
        function formatPriceAndCalculate(input) {

            let value = input.value.replace(/\D/g, '');

            input.value = Number(value).toLocaleString('en-US');

            calculate();
        }

        function calculate() {

            const price = Number(
                document.getElementById("price").value.replace(/,/g, '')
            );
            const installmentCount = Number(document.getElementById("installments").value);

            if (isNaN(price) || isNaN(installmentCount) || installmentCount <= 0) {
                document.getElementById("monthlyInstallmentWithWage").innerText=0;
                document.getElementById("profit").innerText=0;
                document.getElementById("totalAmount").innerText=0;
                document.getElementById("monthlyInstallment").innerText=0;
                document.getElementById("wage").innerText=0;
                document.getElementById("due").innerText=0;

                return;
            }

            const totalAmount =Math.round( price * 0.06 * (installmentCount+1) + price + price/10);
            const profit = Math.round(totalAmount-price) ;
            const monthlyInstallment = Math.round(totalAmount/installmentCount);
            let wage=0
            if (profit>0){
                if (profit<10000000){
                    wage=500000;
                }
                else if(profit<100000000){
                    wage=Math.round((profit-10000000)*0.03 + 1000000);
                }
                else if(profit<500000000){
                    wage=Math.round((profit-100000000)*0.016 + 3700000);
                }
                else{
                    wage=10000000;
                }
            }
            const monthlyInstallmentWithWage=Math.round((totalAmount+wage)/installmentCount);
            const due=Math.round( price * 0.1 * (installmentCount+1) + price + price/10);

            document.getElementById("monthlyInstallmentWithWage").innerText=monthlyInstallmentWithWage.toLocaleString();
            document.getElementById("profit").innerText=profit.toLocaleString();
            document.getElementById("totalAmount").innerText=totalAmount.toLocaleString();
            document.getElementById("monthlyInstallment").innerText=monthlyInstallment.toLocaleString();
            document.getElementById("wage").innerText=wage.toLocaleString();
            document.getElementById("due").innerText=due.toLocaleString();
        }
    </script>
</body>
</html>
